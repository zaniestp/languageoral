<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<title>Reading Activity — Setup</title>
<style>
/* ── Reset ─────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html {
  width: 100vw; height: 100vh;
  overflow: hidden;
}

body {
  width: 100vw; height: 100vh;
  overflow: hidden;
  background: #0d1b2a;
  font-family: 'Segoe UI', Calibri, sans-serif;
  color: #ddd5bb;
  user-select: none;
  -webkit-user-select: none;
  cursor: default;
}

/* ── Background ────────────────────────────────────────────────── */
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 90% 55% at 50% -10%, rgba(18,52,88,0.7) 0%, transparent 65%),
    radial-gradient(ellipse 50% 70% at 95% 100%, rgba(160,120,50,0.07) 0%, transparent 55%);
  pointer-events: none;
}

/* ── Layout ────────────────────────────────────────────────────── */
.page {
  position: relative; z-index: 1;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  height: 100vh; gap: 0;
}

/* ── Card ──────────────────────────────────────────────────────── */
.card {
  width: 460px;
  max-width: calc(100vw - 40px);
  background: rgba(9,20,36,0.94);
  border: 1px solid rgba(190,155,90,0.25);
  border-radius: 6px;
  padding: 46px 50px 42px;
  box-shadow: 0 24px 64px rgba(0,0,0,0.6),
              inset 0 1px 0 rgba(190,155,90,0.1);
}

/* ── Header ────────────────────────────────────────────────────── */
.hdr { text-align: center; margin-bottom: 36px; }

.icon-ring {
  display: inline-flex; align-items: center; justify-content: center;
  width: 56px; height: 56px;
  background: rgba(190,155,90,0.1);
  border: 1px solid rgba(190,155,90,0.32);
  border-radius: 50%;
  margin-bottom: 18px;
}

.icon-ring svg { width: 28px; height: 28px; fill: #c4a05c; }

h1 {
  font-size: 20px; font-weight: 600;
  letter-spacing: 0.09em; text-transform: uppercase;
  color: #e2d8be; margin-bottom: 5px;
}

.sub {
  font-size: 11px; letter-spacing: 0.2em;
  text-transform: uppercase; color: rgba(190,155,90,0.55);
}

.rule {
  height: 1px; margin-bottom: 30px;
  background: linear-gradient(90deg, transparent, rgba(190,155,90,0.28), transparent);
}

/* ── Form ──────────────────────────────────────────────────────── */
.fg { margin-bottom: 20px; }

label {
  display: block;
  font-size: 10.5px; letter-spacing: 0.18em;
  text-transform: uppercase; color: rgba(190,155,90,0.7);
  margin-bottom: 7px;
}

input[type="text"],
select {
  width: 100%;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(190,155,90,0.2);
  border-radius: 4px;
  color: #ddd5bb;
  font-family: inherit; font-size: 15px;
  padding: 11px 13px;
  outline: none;
  transition: border-color 0.2s, background 0.2s;
  -webkit-appearance: none; appearance: none;
}

input[type="text"]::placeholder { color: rgba(255,255,255,0.16); }

input[type="text"]:focus,
select:focus {
  border-color: rgba(190,155,90,0.55);
  background: rgba(190,155,90,0.04);
}

.sel-wrap { position: relative; }
.sel-wrap::after {
  content: '';
  position: absolute; right: 13px; top: 50%;
  transform: translateY(-50%);
  border-left: 5px solid transparent;
  border-right: 5px solid transparent;
  border-top: 6px solid rgba(190,155,90,0.55);
  pointer-events: none;
}

select option { background: #0d1b2a; color: #ddd5bb; }

/* ── Button ────────────────────────────────────────────────────── */
.btn-set {
  width: 100%; margin-top: 8px;
  padding: 13px 0;
  background: rgba(190,155,90,0.1);
  border: 1px solid rgba(190,155,90,0.45);
  border-radius: 4px;
  color: #c4a05c;
  font-family: inherit; font-size: 12px; font-weight: 700;
  letter-spacing: 0.22em; text-transform: uppercase;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 9px;
  transition: background 0.18s, border-color 0.18s, color 0.18s;
}

.btn-set svg { width: 15px; height: 15px; fill: currentColor; }
.btn-set:hover:not(:disabled) {
  background: rgba(190,155,90,0.2);
  border-color: rgba(190,155,90,0.75); color: #e2d8be;
}
.btn-set:active:not(:disabled) { background: rgba(190,155,90,0.28); }
.btn-set:disabled { opacity: 0.4; cursor: not-allowed; }

/* ── Status ────────────────────────────────────────────────────── */
.status {
  display: none; margin-top: 15px;
  padding: 10px 13px; border-radius: 4px;
  font-size: 13px; align-items: center; gap: 10px;
}
.status.show { display: flex; }

.s-loading {
  background: rgba(20,50,100,0.45);
  border: 1px solid rgba(70,130,220,0.28); color: #74a8e0;
}
.s-error {
  background: rgba(100,20,20,0.45);
  border: 1px solid rgba(220,70,70,0.28); color: #e07474;
}

.spin {
  width: 15px; height: 15px; flex-shrink: 0;
  border: 2px solid rgba(116,168,224,0.25);
  border-top-color: #74a8e0;
  border-radius: 50%;
  animation: spin 0.75s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Footer ────────────────────────────────────────────────────── */
.foot {
  margin-top: 26px;
  font-size: 11px; color: rgba(255,255,255,0.15);
  letter-spacing: 0.06em; text-align: center;
}
</style>
</head>
<body>

<div class="page">
  <div class="card">

    <div class="hdr">
      <div class="icon-ring">
        <svg viewBox="0 0 24 24"><path d="M21 5c-1.11-.35-2.33-.5-3.5-.5-1.95 0-4.05.4-5.5 1.5-1.45-1.1-3.55-1.5-5.5-1.5S2.45 4.9 1 6v14.65c0 .25.25.5.5.5.1 0 .15-.05.25-.05C3.1 20.45 5.05 20 6.5 20c1.95 0 4.05.4 5.5 1.5 1.35-.85 3.8-1.5 5.5-1.5 1.65 0 3.35.3 4.75 1.05.1.05.15.05.25.05.25 0 .5-.25.5-.5V6c-.6-.45-1.25-.75-2-1zm0 13.5c-1.1-.35-2.3-.5-3.5-.5-1.7 0-4.15.65-5.5 1.5V8c1.35-.85 3.8-1.5 5.5-1.5 1.2 0 2.4.15 3.5.5v11.5z"/></svg>
      </div>
      <h1>Reading Activity</h1>
      <p class="sub">Session Setup</p>
    </div>

    <div class="rule"></div>

    <div class="fg">
      <label for="eName">Exercise Name</label>
      <input type="text" id="eName" placeholder="Enter the title of this reading exercise…"
             maxlength="72" autocomplete="off" spellcheck="false">
    </div>

    <div class="fg">
      <label for="tSel">Countdown Duration</label>
      <div class="sel-wrap">
        <select id="tSel"></select>
      </div>
    </div>

    <div class="fg">
      <label for="pSel">Pause Before Restart (ending page)</label>
      <div class="sel-wrap">
        <select id="pSel"></select>
      </div>
    </div>

    <button class="btn-set" id="setBtn" onclick="handleSet()">
      <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      Begin Session
    </button>

    <div class="status s-loading" id="sLoad">
      <div class="spin"></div>
      <span id="sLoadTxt">Scanning slides…</span>
    </div>
    <div class="status s-error" id="sErr">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="#e07474" style="flex-shrink:0">
        <path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2zm1 15h-2v-2h2zm0-4h-2V7h2z"/>
      </svg>
      <span id="sErrTxt"></span>
    </div>

  </div>
  <div class="foot">Reading Activity Player &nbsp;·&nbsp; Offline Edition</div>
</div>

<script src="resources/js/common.js"></script>
<script>
'use strict';

// Populate dropdown 1–25
(function () {
  var s = document.getElementById('tSel');
  for (var i = 1; i <= 25; i++) {
    var o = document.createElement('option');
    o.value = i;
    o.textContent = i + (i === 1 ? ' minute' : ' minutes');
    s.appendChild(o);
  }
  s.value = 5;
})();

// Populate pause dropdown 10s–90s step 2
(function () {
  var p = document.getElementById('pSel');
  for (var i = 10; i <= 90; i += 2) {
    var o = document.createElement('option');
    o.value = i;
    o.textContent = i + ' seconds';
    p.appendChild(o);
  }
  p.value = 20; // default 20 s
})();

function ui(loading, errMsg) {
  document.getElementById('sLoad').classList.toggle('show', loading);
  document.getElementById('sErr').classList.toggle('show', !!errMsg);
  if (errMsg) document.getElementById('sErrTxt').textContent = errMsg;
}

async function handleSet() {
  var name = document.getElementById('eName').value.trim();
  if (!name) {
    ui(false, 'Please enter an exercise name before continuing.');
    document.getElementById('eName').focus();
    return;
  }

  var btn = document.getElementById('setBtn');
  btn.disabled = true;
  ui(true, null);
  document.getElementById('sLoadTxt').textContent = 'Entering full screen…';

  // Request fullscreen on user gesture — persists across in-tab navigation
  try {
    await requestFullscreen(document.documentElement);
  } catch (e) { /* non-critical */ }

  document.getElementById('sLoadTxt').textContent = 'Scanning slide resources…';

  try {
    var total = await detectTotalSlides();

    if (total < 3) {
      ui(false, 'Need at least 3 slides (Slide1.png, Slide2.png, Slide3.png). Found: ' + total + '.');
      btn.disabled = false;
      return;
    }

    sessionStorage.setItem('ra_name',   name);
    sessionStorage.setItem('ra_mins',   String(document.getElementById('tSel').value));
    sessionStorage.setItem('ra_pause',  String(document.getElementById('pSel').value));
    sessionStorage.setItem('ra_total',  String(total));
    sessionStorage.removeItem('ra_tStart');

    document.getElementById('sLoadTxt').textContent = total + ' slides detected — opening introduction…';

    setTimeout(function () { window.location.href = 'intro.html'; }, 550);

  } catch (e) {
    ui(false, 'Could not scan resources folder. Check that Slide*.png files exist in /resources/.');
    btn.disabled = false;
  }
}

// Enter key on text field
document.getElementById('eName').addEventListener('keydown', function (e) {
  if (e.key === 'Enter') { e.preventDefault(); handleSet(); }
});
</script>
</body>
</html>
